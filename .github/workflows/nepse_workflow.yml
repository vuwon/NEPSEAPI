name: NEPSE Daily Data Fetch

on:
  schedule:
    - cron: '30 9 * * 0,1,2,3,4'
    # 3:15 PM Nepal Time (NPT = UTC+5:45) → 09:30 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-nepse-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        timeout-minutes: 5

      - name: Run Nepse_API.py
        run: python -u Nepse_API.py
        timeout-minutes: 20

      - name: List output files
        if: always()
        run: |
          echo "=== Files in working directory ==="
          ls -la
          find . -name "*.xlsx" 2>/dev/null || echo "No .xlsx files found"

      # Send Excel file as email attachment to multiple recipients
      - name: Send Excel via Gmail
        run: |
          python - <<'EOF'
          import os, glob, smtplib
          from email.mime.multipart import MIMEMultipart
          from email.mime.base import MIMEBase
          from email.mime.text import MIMEText
          from email import encoders
          from datetime import date

          # ── CONFIG ──────────────────────────────────────────────
          # *** CHANGE THESE: Add all recipient emails here ***
          RECIPIENTS = [
              "thebhuwan@gmail.com",
              "chakratirthasubarna@gmail.com@gmail.com",
              "rajkarnikarm@gmail.com@gmail.com",
          ]
          # ────────────────────────────────────────────────────────

          SENDER       = os.environ["GMAIL_ADDRESS"]
          APP_PASSWORD = os.environ["GMAIL_APP_PASSWORD"]
          TODAY        = date.today().strftime("%Y-%m-%d")

          # Find the Excel file
          files = glob.glob("*.xlsx")
          if not files:
              print("ERROR: No .xlsx file found to attach!")
              exit(1)

          filepath = files[0]
          filename = os.path.basename(filepath)
          print(f"Attaching: {filename}")

          # Build email
          msg = MIMEMultipart()
          msg["From"]    = SENDER
          msg["To"]      = ", ".join(RECIPIENTS)
          msg["Subject"] = f"NEPSE Daily Data — {TODAY}"

          body = f"""
          Hello,

          Please find attached today's NEPSE floorsheet data for {TODAY}.

          File: {filename}

          This is an automated email sent daily at 3:15 PM Nepal Time.

          Regards,
          NEPSE Auto Fetch
          """
          msg.attach(MIMEText(body, "plain"))

          # Attach the Excel file
          with open(filepath, "rb") as f:
              part = MIMEBase("application", "octet-stream")
              part.set_payload(f.read())
          encoders.encode_base64(part)
          part.add_header("Content-Disposition", f'attachment; filename="{filename}"')
          msg.attach(part)

          # Send via Gmail SMTP
          print(f"Sending to: {', '.join(RECIPIENTS)}")
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(SENDER, APP_PASSWORD)
              server.sendmail(SENDER, RECIPIENTS, msg.as_string())

          print(f"✅ Email sent successfully to {len(RECIPIENTS)} recipient(s)!")
          EOF
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      # Backup: also save as GitHub artifact
      - name: Save Excel as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nepse-data-${{ github.run_id }}
          path: "**/*.xlsx"
          if-no-files-found: warn
          retention-days: 30
